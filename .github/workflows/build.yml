name: Build Kernel
on:
  workflow_dispatch:
    inputs:
      REPO_URL:
        description: 'Kernel repository URL'
        default: 'blxyzY/android_kernel_samsung_sm6225'
        required: true
      DEFCONFIG:
        description: 'Defconfig name'
        default: ''
        required: true
      LTO:
        description: 'Link Time Optimisation'
        required: true
        default: 'none'
        type: choice
        options:
          - none
          - thin
          - full
      CLANG_VERSION:
        description: 'Clang version'
        required: true
        default: 'neutron-clang-23'
        type: choice
        options:
          - neutron-clang-23
          - aosp-clang-22
          - aosp-clang-21
          - aosp-clang-20
      BRANCH:
        description: 'Kernel branch'
        default: ''
        required: true
      SETUP_KSU:
        description: 'KernelSU support'
        type: boolean
        default: false
      KSU_BRANCH:
        description: 'KernelSU branch'
        default: 'main'
        required: true
      SELINUX_PERMISSIVE:
        description: 'Set SELinux as Permissive'
        type: boolean
        default: false
      KCFLAGS_W:
        description: 'Enable KCFLAGS=-w'
        type: boolean
        default: true
      UPLOAD_TO_TG:
        description: 'Upload to Telegram'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: uploadTelegram
    steps:
    - name: Checkout builder
      uses: actions/checkout@v4
      with:
        repository: blxyzY/build_kernel
        path: builder
        show-progress: false
        fetch-depth: 1
        
    - name: Checkout kernel
      uses: actions/checkout@v4
      with:
        path: kernel
        ref: ${{ github.event.inputs.BRANCH }}
        show-progress: false
        fetch-depth: 10
        repository: ${{ github.event.inputs.REPO_URL }}
        
    - name: Install dependencies
      run: |
        sudo apt update -y
        sudo apt install -y bc cpio flex bison git python-is-python3 \
          libc6-dev tar perl curl lz4 wget zip unzip build-essential libssl-dev
          
    - name: Prepare timezone
      run: |
        sudo rm -f /etc/localtime
        sudo ln -s /usr/share/zoneinfo/Asia/Jakarta /etc/localtime
        
    - name: Prepare Build Kernel
      run: |
        cp ../builder/build.sh .
        chmod +x build.sh
        if [ -d "../builder/AnyKernel3" ]; then
          echo "Copying AnyKernel3 from builder repository..."
          cp -r ../builder/AnyKernel3 .
          echo "AnyKernel3 copied successfully"
        else
          echo "ERROR: AnyKernel3 not found in builder repository!"
          exit 1
        fi
        echo "Contents of AnyKernel3:"
        ls -la AnyKernel3/
      working-directory: kernel
        
    - name: Build kernel
      id: build
      run: |
        BUILD_START=$(date +%s)
        
        export KBUILD_BUILD_USER="${{ github.event.inputs.KBUILD_USER }}"
        export KBUILD_BUILD_HOST="xlvy_10"
        export IS_CI=true
        export DEVICE="A235F"
        export LTO="${{ github.event.inputs.LTO }}"
        export CLANG_VERSION="${{ github.event.inputs.CLANG_VERSION }}"
        export QCA_IS_MODULE=false
        
        if [[ "${{ github.event.inputs.SETUP_KSU }}" = "true" ]]; then
          export KERNELSU=true
          export KSU_BRANCH="${{ github.event.inputs.KSU_BRANCH }}"
        else
          export KERNELSU=false
        fi
        
        if [[ "${{ github.event.inputs.SELINUX_PERMISSIVE }}" = "true" ]]; then
          export SELINUX_PERMISSIVE=true
          export SELINUX_STATE="Permissive"
        else
          export SELINUX_PERMISSIVE=false
          export SELINUX_STATE="Enforcing"
        fi
        
        if [[ "${{ github.event.inputs.KCFLAGS_W }}" = "true" ]]; then
          export KCFLAGS="-w"
        fi
        
        ./build.sh kernel -j $(nproc) ${{ github.event.inputs.DEFCONFIG }}
        BUILD_END=$(date +%s)
        BUILD_DURATION=$((BUILD_END - BUILD_START))
        BUILD_TIME=$(printf '%02d:%02d:%02d' $((BUILD_DURATION/3600)) $((BUILD_DURATION%3600/60)) $((BUILD_DURATION%60)))
        
        echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
        echo "build_date=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
        echo "Build completed in: $BUILD_TIME"
      working-directory: kernel
      
    - name: Upload AnyKernel3
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-${{ steps.build.outputs.build_date }}
        path: kernel/*.zip
        compression-level: 9
        
    - name: Upload Build Details
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: BuildDetails-${{ steps.build.outputs.build_date }}
        path: |
          kernel/out/build_details.txt
          kernel/out/build_config.txt
        compression-level: 9
        
    - name: Upload to Telegram
      if: github.event.inputs.UPLOAD_TO_TG == 'true' && success()
      env:
        CHAT_ID: ${{ secrets.CHAT_ID }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        KERNEL_VER: ${{ env.KERNEL_VER }}
        GIT_SHA: ${{ env.GIT_SHA }}
        LTO: ${{ env.LTO }}
        KERNELSU: ${{ env.KERNELSU }}
        KSU_VERSION: ${{ env.KSU_VERSION }}
        KSU_BRANCH: ${{ env.KSU_BRANCH }}
        SELINUX_STATE: ${{ env.SELINUX_STATE }}
        CLANG_VER: ${{ env.CLANG_VER }}
        DEVICE: ${{ env.DEVICE }}
        BUILD_TIME: ${{ env.BUILD_TIME }}
      run: |
        if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
          echo "Telegram secrets not configured"
          exit 0
        fi
        
        ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -1)
        if [ -z "$ZIP_FILE" ]; then
          echo "No zip file found"
          exit 0
        fi
        
        echo "Found zip: $ZIP_FILE"
        
        if [ -n "$BUILD_TIME" ]; then
          HOURS=$(echo "$BUILD_TIME" | cut -d: -f1 | sed 's/^0//')
          MINS=$(echo "$BUILD_TIME" | cut -d: -f2 | sed 's/^0//')
          SECS=$(echo "$BUILD_TIME" | cut -d: -f3 | sed 's/^0//')
          BUILD_TIME_FORMATTED="build succeeded in ${HOURS}h ${MINS}m ${SECS}s"
        else
          BUILD_TIME_FORMATTED="build succeeded in unknown"
        fi
        
        MD5_CHECK=$(md5sum "$ZIP_FILE" | cut -d' ' -f1)
        CLANG_CLEAN=$(echo "$CLANG_VER" | cut -d'(' -f1 | sed 's/[[:space:]]*$//')
        MESSAGE="${BUILD_TIME_FORMATTED}
        Device: ${DEVICE:-A235F}
        Version: ${KERNEL_VER:-unknown}
        SELinux: ${SELINUX_STATE:-Enforcing}
        MD5: \`${MD5_CHECK}\`
        Compiler: ${CLANG_CLEAN}"
        curl -s -F document=@"$ZIP_FILE" \
          -F chat_id="${CHAT_ID}" \
          -F caption="$(echo -e "$MESSAGE")" \
          -F parse_mode="Markdown" \
          "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
        
        echo "Upload completed!"
      working-directory: kernel
      
